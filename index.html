<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sarabdeep Singh Bilkhu</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <div class="sidebar">
    <a href="#">🐙</a>
    <a href="#">📸</a>
    <a href="#">✉️</a>
    <a href="#">💼</a>
  </div>
  <div class="main">
    <div class="topbar">
      <div>
        <h1>Sarabdeep Singh Bilkhu</h1>
        <p>Crafting code-driven solutions in data & hardware.</p>
      </div>
      <div class="time" id="clock"></div>
    </div>

    <input type="text" class="terminal-input" placeholder="$ Type a command or search...">

    <div class="cards">
      <div class="card" onclick="window.open('documents.html', '_blank')">📄 Documents</div>
      <div class="card" onclick="window.open('projects.html', '_blank')">📦 Projects</div>
      <div class="card" onclick="window.open('about.html', '_blank')">👤 About</div>
      <div class="card" onclick="window.open('contact.html', '_blank')">📬 Contact</div>
    </div>

  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('clock').innerHTML = now.toLocaleTimeString() + '<br>' + now.toLocaleDateString(undefined, options);
    }
    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
